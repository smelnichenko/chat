server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: chat-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:monitor_chat}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  security:
    oauth2:
      resourceserver:
        jwt:
          # App-side JWT validation, defense-in-depth on top of the gateway's
          # edge check: the signature is verified against the Keycloak JWKS here
          # too, so a forged token injected east-west (bypassing the gateway) is
          # rejected. jwk-set-uri (not issuer-uri alone) keeps key fetching lazy
          # — no Keycloak dependency at startup.
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/schnappy}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/schnappy/protocol/openid-connect/certs}
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: 6379
      password: ${VALKEY_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "io.schnappy.chat.dto,java.util,java.lang"
        spring.json.value.default.type: "java.util.LinkedHashMap"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

monitor:
  chat:
    e2e-enabled: ${CHAT_E2E_ENABLED:false}
    scylla:
      contact-points: ${SCYLLA_HOST:localhost}
      port: ${SCYLLA_PORT:9042}
      datacenter: ${SCYLLA_DATACENTER:datacenter1}
      keyspace: ${SCYLLA_KEYSPACE:chat}
